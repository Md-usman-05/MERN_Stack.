<!DOCTYPE html>
<html lang="en">
<head>

    <title>Forms</title>
    <link rel="stylesheet" href="\CSS\Position.css">

</head>
<body>
    <div>
   <header>
<h1>Forms</h1>
   </header>
   <main>
   <form>
    <label>Name:</label>
    <input type="text" placeholder="Enter name">
    <br>
    <label>Email:</label>
    <input type="email" placeholder="Enter email">
    <br>
    <label>Password:</label>
    <input type="password" placeholder="Enter password">
    <br>
        <label>Phn.NO:</label>
    <input type="number" placeholder="Enter number">
    <br>
        <label>Gender:</label>
    <input type="radio" name="gender" id=1>male 
    <input type="radio" name="gender" id=2>female
    <br>
     <label>Qualification:</label>
    <input type="checkbox">10 <sup>th</sup>
    <input type="checkbox">Diploma 
    <input type="checkbox">Bachelor
    <input type="checkbox">Doctrate
    <br>
       <label>D.O.B:</label>
    <input type="datetime-local">
    <br>
     <label>Image:</label>
    <input type="file">
    <br>
   </form>
   </main>
   <footer>
   <center><button type="submit">Submit</button></center>
   </footer>
    </div>
</body>
</html>
