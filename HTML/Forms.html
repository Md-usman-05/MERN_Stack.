<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <!-- <link rel="stylesheet" href="\CSS\Position.css"> -->

</head>
<body>
    <div>
   <header>
<h1>Forms</h1>
   </header>
   <main>
   <form id="userForm" onsubmit="show(event)">
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter name">
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter email">
    <br>
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter password">
    <br>
    <label for="Phn.NO">Phn.NO:</label>
    <input type="number" id="Phn.NO" placeholder="Enter number">
    <br>
    <label>Gender:</label>
    <input type="radio" name="gender" value="male">male 
    <input type="radio" name="gender" value="female">female
    <br>
    <label>Qualification:</label>
    <input class="Qualification" type="checkbox" value="10th">10 <sup>th</sup>
    <input class="Qualification" type="checkbox" value="12th">12 <sup>th</sup>
    <input class="Qualification" type="checkbox" value="Diploma">Diploma 
    <input class="Qualification" type="checkbox" value="Bachelor">Bachelor
    <input class="Qualification" type="checkbox" value="Doctrate">Doctrate
    <br>
    <label for="date">D.O.B:</label>
    <input type="datetime-local" id="date">
    <br>
    <label for="image">Image:</label>
    <input type="file" id="image">
    <br>
    <button type="submit">Submit</button>
    <div id="result"></div>
   </form>
   </main>
   <footer>
   <center></center>
   </footer>
    </div>
<script src="../JS/script.js"></script>
</body>
</html>
