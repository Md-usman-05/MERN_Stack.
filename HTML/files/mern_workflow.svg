<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a13"/>
    </linearGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161f38"/>
      <stop offset="100%" stop-color="#0d1527"/>
    </linearGradient>

    <!-- Tech Colors Gradients -->
    <linearGradient id="react-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <linearGradient id="node-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="100%" stop-color="#11998e"/>
    </linearGradient>

    <linearGradient id="mongo-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8ff78"/>
      <stop offset="100%" stop-color="#78ffd6"/>
    </linearGradient>

    <!-- Flow Arrows Gradients -->
    <linearGradient id="flow-req" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>

    <linearGradient id="flow-res" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>

    <linearGradient id="flow-query" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="100%" stop-color="#a8ff78"/>
    </linearGradient>

    <linearGradient id="flow-data" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8ff78"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>

    <!-- Filters for Glow Effects -->
    <filter id="glow-react-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow-to-node" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#38ef7d"/>
    </marker>
    <marker id="arrow-to-react" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M7,1 L1,4 L7,7 Z" fill="#00f2fe"/>
    </marker>
    <marker id="arrow-to-mongo" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#a8ff78"/>
    </marker>
    <marker id="arrow-to-node-from-db" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M7,1 L1,4 L7,7 Z" fill="#38ef7d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  
  <!-- Subtle background grid pattern -->
  <g opacity="0.05">
    <path d="M0,45 H960 M0,90 H960 M0,135 H960 M0,180 H960 M0,225 H960 M0,270 H960 M0,315 H960 M0,360 H960 M0,405 H960 M0,450 H960 M0,495 H960" stroke="#ffffff" stroke-width="1"/>
    <path d="M80,0 V540 M160,0 V540 M240,0 V540 M320,0 V540 M400,0 V540 M480,0 V540 M560,0 V540 M640,0 V540 M720,0 V540 M800,0 V540 M880,0 V540" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="480" y="50" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">
    MERN STACK WORKFLOW
  </text>
  <text x="480" y="75" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    Full-Stack Data Flow &amp; Architecture
  </text>

  <!-- ================= CLIENT TIER (REACT) ================= -->
  <g transform="translate(80, 110)" filter="url(#shadow)">
    <!-- Border Glow -->
    <rect x="-4" y="-4" width="228" height="308" rx="20" fill="url(#react-glow)" opacity="0.25" filter="url(#glow-react-filter)"/>
    <!-- Main Card -->
    <rect width="220" height="300" rx="16" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- React Logo -->
    <g transform="translate(110, 60)">
      <ellipse rx="35" ry="14" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.8"/>
      <ellipse rx="35" ry="14" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.8" transform="rotate(60)"/>
      <ellipse rx="35" ry="14" fill="none" stroke="#00f2fe" stroke-width="2" opacity="0.8" transform="rotate(120)"/>
      <circle r="7" fill="#00f2fe"/>
    </g>
    
    <!-- Text Content -->
    <text x="110" y="130" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">React.js</text>
    <text x="110" y="152" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#00f2fe" text-anchor="middle" letter-spacing="0.5">FRONTEND CLIENT</text>
    
    <line x1="20" y1="175" x2="200" y2="175" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Bullet points -->
    <g transform="translate(25, 200)" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">
      <circle cx="5" cy="5" r="3" fill="#00f2fe"/>
      <text x="18" y="9">Renders Dynamic UI</text>
      
      <circle cx="5" cy="30" r="3" fill="#00f2fe"/>
      <text x="18" y="34">Handles User Events</text>
      
      <circle cx="5" cy="55" r="3" fill="#00f2fe"/>
      <text x="18" y="59">Sends HTTP Requests</text>
    </g>
  </g>

  <!-- ================= SERVER TIER (NODE & EXPRESS) ================= -->
  <g transform="translate(370, 110)" filter="url(#shadow)">
    <!-- Border Glow -->
    <rect x="-4" y="-4" width="228" height="308" rx="20" fill="url(#node-glow)" opacity="0.25" filter="url(#glow-react-filter)"/>
    <!-- Main Card -->
    <rect width="220" height="300" rx="16" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- Node / Express Icon -->
    <g transform="translate(110, 60)">
      <!-- Server Node/Hexagon shape -->
      <polygon points="0,-35 30,-18 30,18 0,35 -30,18 -30,-18" fill="none" stroke="#38ef7d" stroke-width="2.5"/>
      <path d="M-15,-8 L0,15 L15,-8" fill="none" stroke="#38ef7d" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="-10" r="5" fill="#38ef7d"/>
    </g>
    
    <!-- Text Content -->
    <text x="110" y="130" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Node &amp; Express</text>
    <text x="110" y="152" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#38ef7d" text-anchor="middle" letter-spacing="0.5">BACKEND SERVER</text>
    
    <line x1="20" y1="175" x2="200" y2="175" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Bullet points -->
    <g transform="translate(25, 200)" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">
      <circle cx="5" cy="5" r="3" fill="#38ef7d"/>
      <text x="18" y="9">Runs Web Server</text>
      
      <circle cx="5" cy="30" r="3" fill="#38ef7d"/>
      <text x="18" y="34">Exposes REST APIs</text>
      
      <circle cx="5" cy="55" r="3" fill="#38ef7d"/>
      <text x="18" y="59">Business Logic &amp; Auth</text>
    </g>
  </g>

  <!-- ================= DATABASE TIER (MONGODB) ================= -->
  <g transform="translate(660, 110)" filter="url(#shadow)">
    <!-- Border Glow -->
    <rect x="-4" y="-4" width="228" height="308" rx="20" fill="url(#mongo-glow)" opacity="0.25" filter="url(#glow-react-filter)"/>
    <!-- Main Card -->
    <rect width="220" height="300" rx="16" fill="url(#card-grad)" stroke="#1e293b" stroke-width="1.5"/>
    
    <!-- MongoDB Leaf Logo -->
    <g transform="translate(110, 60)">
      <!-- Database cylinders -->
      <path d="M-25,-20 C-25,-28 25,-28 25,-20 L25,15 C25,23 -25,23 -25,15 Z" fill="none" stroke="#a8ff78" stroke-width="2.5"/>
      <path d="M-25,-8 C-25,0 25,0 25,-8" fill="none" stroke="#a8ff78" stroke-width="2"/>
      <path d="M-25,4 C-25,12 25,12 25,4" fill="none" stroke="#a8ff78" stroke-width="2"/>
      <ellipse cx="0" cy="-20" rx="25" ry="7" fill="#a8ff78" opacity="0.4"/>
    </g>
    
    <!-- Text Content -->
    <text x="110" y="130" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">MongoDB</text>
    <text x="110" y="152" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#a8ff78" text-anchor="middle" letter-spacing="0.5">DATABASE TIER</text>
    
    <line x1="20" y1="175" x2="200" y2="175" stroke="#1e293b" stroke-width="1"/>
    
    <!-- Bullet points -->
    <g transform="translate(25, 200)" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8">
      <circle cx="5" cy="5" r="3" fill="#a8ff78"/>
      <text x="18" y="9">NoSQL Document Store</text>
      
      <circle cx="5" cy="30" r="3" fill="#a8ff78"/>
      <text x="18" y="34">Flexible JSON Schemas</text>
      
      <circle cx="5" cy="55" r="3" fill="#a8ff78"/>
      <text x="18" y="59">Fast, Scale-out Queries</text>
    </g>
  </g>

  <!-- ================= FLOW CONNECTIONS & LABELS ================= -->
  
  <!-- 1. React -> Node HTTP Request Arrow (TOP) -->
  <path d="M 300 200 L 360 200" fill="none" stroke="url(#flow-req)" stroke-width="3" marker-end="url(#arrow-to-node)"/>
  <text x="330" y="180" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#00f2fe" text-anchor="middle">
    HTTP Request
  </text>
  <text x="330" y="193" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">
    GET / POST / PUT
  </text>

  <!-- 2. Node -> React HTTP Response Arrow (BOTTOM) -->
  <path d="M 360 300 L 306 300" fill="none" stroke="url(#flow-res)" stroke-width="3" marker-end="url(#arrow-to-react)"/>
  <text x="330" y="322" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38ef7d" text-anchor="middle">
    JSON Response
  </text>
  <text x="330" y="335" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">
    Data / Status Codes
  </text>

  <!-- 3. Node -> MongoDB Mongoose Query (TOP) -->
  <path d="M 590 200 L 650 200" fill="none" stroke="url(#flow-query)" stroke-width="3" marker-end="url(#arrow-to-mongo)"/>
  <text x="620" y="180" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#38ef7d" text-anchor="middle">
    DB Query
  </text>
  <text x="620" y="193" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">
    Mongoose / Find / Save
  </text>

  <!-- 4. MongoDB -> Node Data Return (BOTTOM) -->
  <path d="M 660 300 L 606 300" fill="none" stroke="url(#flow-data)" stroke-width="3" marker-end="url(#arrow-to-node-from-db)"/>
  <text x="620" y="322" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#a8ff78" text-anchor="middle">
    BSON Data
  </text>
  <text x="620" y="335" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">
    Documents / Collections
  </text>

  <!-- Core Flow Guide Legend (At bottom center) -->
  <g transform="translate(480, 450)">
    <rect x="-220" y="0" width="440" height="60" rx="10" fill="#161f38" stroke="#1e293b" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- Step Numbers & Info -->
    <text x="0" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
      1. Request &#x279E; 2. Database Query &#x279E; 3. Data Return &#x279E; 4. Response
    </text>
    
    <text x="0" y="42" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Modern Full-Stack Javascript Web Architecture
    </text>
  </g>
</svg>
